syntax = "proto3";
option go_package = "github.com/meedaycodes/day12-grpc/proto";
package user;

message User {
      string id = 1;
      string name = 2;
      string email = 3;
}

message GetUserRequest {
    string id = 1;
}

message CreateUserRequest {
    string name = 1; 
    string email = 2;
}

service UserService {
    rpc GetUser (GetUserRequest) returns (User);
    rpc CreateUser (CreateUserRequest) returns (User);
}