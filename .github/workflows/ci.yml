name: CI

on: 
  push:
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v7
        with:                                                                                                                                         
          working-directory: week-2/day-14-integration-testing
          version: v2.12.2 


  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: goapp
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: gobackend
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps: 
      - uses: actions/checkout@v4                                                                                                                         
      - uses: actions/setup-go@v5
        with:                                                                                                                                             
          go-version: '1.25'
      - name: Run tests                                                                                                                                     
        run: go test -v -race ./...                                                                                                                       
        working-directory: week-2/day-14-integration-testing                                                                                                
        env:                                                                                                                                                
          DATABASE_URL: postgres://goapp:secret@localhost:5432/gobackend?sslmode=disable                                                                    
          REDIS_ADDR: localhost:6379                                                                                                                        
          JWT_SECRET: secret

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4                                                                                                                         
      - uses: actions/setup-go@v5
        with:                                                                                                                                             
          go-version: '1.25'
      - name: Build                                                                                                                                 
        run: go build -o bin/server ./cmd/server  
        working-directory: week-2/day-14-integration-testing                                                                                                                    
        


